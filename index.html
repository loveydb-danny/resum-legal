<style>
:root{--ink:#1a1a1a;--sub:#555;--line:#e5e5e5;--brand:#ff5a7e;--bg:#fff;--soft:#faf7f8}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",
  "Segoe UI",Roboto,sans-serif;line-height:1.7;font-size:16px;word-break:keep-all;overflow-wrap:anywhere}
.wrap{max-width:780px;margin:0 auto;padding:32px 20px 80px}
header.site{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:28px}
header.site .brand{font-weight:700;color:var(--brand);letter-spacing:.5px;font-size:15px}
h1{font-size:24px;margin:10px 0 6px;line-height:1.35}
.meta{color:var(--sub);font-size:14px;margin:0}
.intro{background:var(--soft);border:1px solid var(--line);border-radius:12px;
  padding:16px 18px;margin:24px 0;color:var(--sub);font-size:15px}
h2{font-size:19px;margin:36px 0 12px;padding-top:8px;border-top:1px solid var(--line);padding-top:28px}
h3{font-size:16px;margin:24px 0 10px;color:var(--ink)}
p{margin:12px 0}
ol,ul{margin:12px 0;padding-left:22px}
li{margin:8px 0}
ul.plain{list-style:none;padding-left:0}
ul.plain>li{padding-left:16px;position:relative}
ul.plain>li::before{content:"·";position:absolute;left:2px;color:var(--brand);font-weight:700}
.sub{margin:8px 0 8px 4px;padding-left:18px}
strong{font-weight:700}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:14px 0;border:1px solid var(--line);border-radius:12px}
table{border-collapse:collapse;width:100%;min-width:520px;font-size:14px}
th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);
  padding:10px 12px;text-align:left;vertical-align:top}
th:last-child,td:last-child{border-right:none}
thead th{background:var(--soft);font-weight:700;white-space:nowrap}
tbody td:first-child{font-weight:600}
dl.company{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:16px 0}
dl.company div{display:flex;gap:8px;margin:6px 0;font-size:15px}
dl.company dt{color:var(--sub);min-width:74px;flex:0 0 auto}
dl.company dd{margin:0}
footer.site{margin-top:48px;border-top:1px solid var(--line);padding-top:20px;color:var(--sub);font-size:13px}
footer.site a{color:var(--brand);text-decoration:none}
a{color:var(--brand)}
@media(max-width:480px){.wrap{padding:24px 16px 64px}h1{font-size:21px}h2{font-size:17px}}
</style>
